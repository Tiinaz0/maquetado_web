<!DOCTYPE html>
<!-- <!DOCTYPE html>
Es una declaración, no una etiqueta.
Le indica al navegador que el documento está escrito en HTML5.
Ayuda a que el navegador interprete correctamente el contenido.<!DOCTYPE html>
Es una declaración, no una etiqueta.
Le indica al navegador que el documento está escrito en HTML5.
Ayuda a que el navegador interprete correctamente el contenido. -->

<html lang="en">

<!-- <html lang="en">
Es la etiqueta raíz del documento HTML.
Todo el contenido debe ir dentro de esta etiqueta.
lang="en" indica que el idioma del contenido es inglés.
Esto es importante para accesibilidad, buscadores y traducciones. -->

<head>
<!-- <head>
Contiene información no visible directamente en la página.
Aquí se configuran aspectos técnicos del documento. -->

    <meta charset="UTF-8">
<!-- <meta charset="UTF-8">
Define la codificación de caracteres.
UTF-8 permite usar casi todos los caracteres (incluyendo acentos, emojis, etc.).
Evita errores al mostrar texto. -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- <meta name="viewport" content="width=device-width, initial-scale=1.0">
Controla cómo se ve la página en dispositivos móviles.
width=device-width: adapta el ancho al tamaño de la pantalla.
initial-scale=1.0: establece el nivel de zoom inicial.
Es clave para el diseño responsive. -->

    <title>Document</title>
    <!-- <title>Document</title>
Define el título de la página.
Es lo que aparece en la pestaña del navegador.
También lo usan los motores de búsqueda. -->
</head>
<!-- <head>
Contiene información no visible directamente en la página.
Aquí se configuran aspectos técnicos del documento. -->
<body>
    <!-- <body>
Contiene todo el contenido visible de la página.
Aquí van textos, imágenes, botones, etc. -->
</body>
<!-- <body>
Contiene todo el contenido visible de la página.
Aquí van textos, imágenes, botones, etc. -->
</html>
<!-- </body> y </html>
Son etiquetas de cierre.
Indican el final del contenido del <body> y del documento HTML. -->
